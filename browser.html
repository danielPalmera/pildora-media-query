<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modo Browser</title>
    <style>

        @media (display-mode: browser) {
            body {
                background-color: red;
            }
        }
    </style>
</head>
<body>
    <h1>display-mode: browser</h1>
    <p>Esta página se ve en un navegador normal con la barra de direcciones.</p>
    <p>Cambia el tamaño o abre otra pestaña para confirmar que estás en modo "browser".</p>
</body>
</html>
