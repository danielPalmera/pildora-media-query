<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modo Standalone</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 2rem;
            transition: background .3s;
        }

        @media (display-mode: standalone) {
            body {
                background: #d3f9d8;
            }
        }
    </style>
</head>
<body>
    <h1>display-mode: standalone</h1>
    <p>Instala esta web como aplicación (agregar a la pantalla de inicio / PWA) para probar.</p>
    <p>En este modo la página se muestra sin barras de navegador.</p>
</body>
</html>
